<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Scene 0: タイトル</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #111;
  }

  .slide {
    width: 1920px; height: 1080px;
    background: linear-gradient(135deg, #1E3A5F 0%, #2C5F8A 50%, #5B9BD5 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: #fff;
    overflow: hidden;
    position: relative;
  }

  .icon {
    width: 150px; height: 150px;
    border-radius: 32px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    opacity: 0;
    transform: scale(0.7);
    animation: iconAppear 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 0.3s;
  }
  .icon img { width: 100%; height: 100%; }

  h1 {
    font-size: 72px;
    font-weight: 900;
    letter-spacing: 4px;
    margin-top: 32px;
    opacity: 0;
    animation: fadeSlideUp 0.7s ease forwards 1.2s;
  }

  .subtitle {
    font-size: 28px;
    color: rgba(255,255,255,0.8);
    margin-top: 16px;
    letter-spacing: 1px;
    opacity: 0;
    animation: fadeSlideUp 0.7s ease forwards 2.0s;
  }

  .divider {
    width: 80px;
    height: 3px;
    background: rgba(255,255,255,0.4);
    border-radius: 2px;
    margin-top: 32px;
    opacity: 0;
    animation: fadeIn 0.5s ease forwards 3.5s;
  }

  .tagline {
    font-size: 20px;
    color: rgba(255,255,255,0.6);
    margin-top: 24px;
    opacity: 0;
    animation: fadeSlideUp 0.6s ease forwards 3.5s;
  }

  @keyframes iconAppear {
    from { opacity: 0; transform: scale(0.7); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    to { opacity: 1; }
  }
</style>
</head>
<body>
<div class="slide">
  <div class="icon">
    <img src="../../public/icons/icon128.png" alt="icon">
  </div>
  <h1>オフラインOCR</h1>
  <p class="subtitle">どこにも通信しない、安全な範囲選択OCR</p>
  <div class="divider"></div>
  <p class="tagline">Powered by NDLOCR — 国立国会図書館のOCR技術</p>
</div>
</body>
</html>

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Pages site
        run: |
          mkdir -p _site/public/icons _site/store
          cp store/screenshots.html _site/store/screenshots.html
          cp store/screenshots.html _site/index.html
          cp store/privacy-policy.html _site/privacy-policy.html
          cp -r public/icons/* _site/public/icons/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
      - id: deployment
        uses: actions/deploy-pages@v4

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Outro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #111;
  }

  .slide {
    width: 1080px; height: 1920px;
    background: linear-gradient(135deg, #1E3A5F 0%, #2C5F8A 50%, #5B9BD5 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: #fff;
    overflow: hidden;
    position: relative;
    gap: 48px;
  }

  /* Animated background */
  .slide::before {
    content: '';
    position: absolute;
    top: -20%; right: -20%;
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
    border-radius: 50%;
    animation: glowFloat 4s ease-in-out infinite;
  }

  /* Shield animation */
  .shield-container {
    position: relative;
    opacity: 0;
    animation: shieldSlam 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 0.3s;
  }

  .shield {
    width: 140px; height: 140px;
    background: rgba(255,255,255,0.12);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 64px;
    box-shadow: 0 4px 30px rgba(0,0,0,0.2), 0 0 60px rgba(91,155,213,0.2);
  }

  /* Pulse rings around shield */
  .shield-container::before, .shield-container::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.15);
  }
  .shield-container::before {
    width: 180px; height: 180px;
    animation: pulseRing 2s ease-out infinite 0.9s;
  }
  .shield-container::after {
    width: 220px; height: 220px;
    animation: pulseRing 2s ease-out infinite 1.3s;
  }

  .privacy-text {
    font-size: 48px;
    font-weight: 900;
    text-align: center;
    line-height: 1.5;
    text-shadow: 0 4px 20px rgba(0,0,0,0.3);
    opacity: 0;
    animation: titleSlam 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 1.0s;
  }

  .privacy-sub {
    font-size: 28px;
    color: rgba(255,255,255,0.7);
    text-align: center;
    opacity: 0;
    animation: fadeSlideUp 0.4s ease forwards 1.5s;
  }

  /* Note badge */
  .note {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255,200,50,0.15);
    border: 2px solid rgba(255,200,50,0.4);
    border-radius: 16px;
    padding: 20px 36px;
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    opacity: 0;
    animation: noteBounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 4.0s;
    box-shadow: 0 4px 20px rgba(255,200,50,0.1);
  }

  /* CTA section */
  .cta {
    display: flex; flex-direction: column;
    align-items: center; gap: 28px;
    opacity: 0;
    animation: fadeSlideUp 0.6s ease forwards 7.0s;
  }

  .cta-logo {
    display: flex; align-items: center; gap: 20px;
  }

  .cta-icon {
    width: 80px; height: 80px;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
  .cta-icon img { width: 100%; height: 100%; }

  .cta-name {
    font-size: 48px;
    font-weight: 900;
    letter-spacing: 2px;
  }

  .cta-search {
    font-size: 34px;
    font-weight: 700;
    color: #fff;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.35);
    border-radius: 16px;
    padding: 18px 44px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: ctaPulse 1.5s ease-in-out infinite 8.0s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }

  @keyframes shieldSlam {
    0%   { opacity: 0; transform: scale(2) rotate(-15deg); }
    60%  { opacity: 1; transform: scale(0.9) rotate(3deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
  }
  @keyframes titleSlam {
    0%   { opacity: 0; transform: scale(1.5) translateY(-20px); }
    60%  { opacity: 1; transform: scale(0.95) translateY(5px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes noteBounce {
    0%   { opacity: 0; transform: scale(0.5) rotate(-3deg); }
    70%  { opacity: 1; transform: scale(1.05) rotate(1deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
  }
  @keyframes pulseRing {
    0%   { opacity: 0.6; transform: translate(-50%,-50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%,-50%) scale(1.5); }
  }
  @keyframes glowFloat {
    0%, 100% { opacity: 0.5; transform: translateY(0) scale(1); }
    50%      { opacity: 0.8; transform: translateY(-30px) scale(1.1); }
  }
  @keyframes ctaPulse {
    0%, 100% { box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
    50%      { box-shadow: 0 4px 30px rgba(91,155,213,0.4); }
  }
</style>
</head>
<body>
<div class="slide">
  <div class="shield-container">
    <div class="shield">🔒</div>
  </div>
  <div class="privacy-text">通信ゼロ。<br>すべてブラウザ内で完結。</div>
  <p class="privacy-sub">画像もテキストも外部に送信されません</p>

  <div class="note">⚠️ アプリじゃなくてChromeの拡張機能だよ！</div>

  <div class="cta">
    <div class="cta-logo">
      <div class="cta-icon">
        <img src="../../public/icons/icon128.png" alt="icon">
      </div>
      <div class="cta-name">オフラインOCR</div>
    </div>
    <div class="cta-search">
      🔍「オフラインOCR」で検索
    </div>
  </div>
</div>
</body>
</html>
